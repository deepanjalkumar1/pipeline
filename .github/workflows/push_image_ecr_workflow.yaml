name: Push Docker Image to ECR

on:
  workflow_run:
    workflows: ["Trivy Security Scan"]
    types:
      - completed

jobs:
  push-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t fastapi-app -f src/Dockerfile .

      - name: Tag Docker Image
        run: |
          docker tag fastapi-app:latest ${{ steps.login-ecr.outputs.registry }}/fastapi-app:latest
        
      - name: Push Docker Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/fastapi-app:latest