name: Deployment on Kubernetes

on:
  workflow_run:
    workflows: ["Testing and Vulnerability Analysis"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 and Update Kubernetes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connecting to EC2..."

            echo "Login to ECR"
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 154845615393.dkr.ecr.ap-south-1.amazonaws.com

            echo "Updating Kubernetes Deployment"
            kubectl set image deployment/fastapi fastapi=154845615393.dkr.ecr.ap-south-1.amazonaws.com/fastapi-app:latest

            echo "Checking rollout status"
            kubectl rollout status deployment/fastapi
