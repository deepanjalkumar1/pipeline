name: Deployment on Kubernetes

on:
  workflow_run:
    workflows: ["SonarCloud Analysis"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Deploy new image to Kubernetes
        run: |
          kubectl set image deployment/fastapi \
          fastapi=154845615393.dkr.ecr.ap-south-1.amazonaws.com/fastapi-app:${{ github.sha }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/fastapi
